name: sync wiki

on:
  push:
    branches: [main]
    paths: [docs/wiki/**, .github/workflows/wiki.yml]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          token: ${{ secrets.WIKI_TOKEN }}
          path: docs/wiki
