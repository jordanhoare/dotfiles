name: sync wiki

on:
  push:
    branches: [main]
    paths: [docs/wiki/**]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: sync to wiki
        uses: newrelic/wiki-sync-action@v1.0.1
        with:
          source: docs/wiki
          destination: wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          gitAuthorName: ${{ github.actor }}
          gitAuthorEmail: ${{ github.actor }}@users.noreply.github.com
